name: ciro_chat_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  dio: ^5.9.2
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_secure_storage: ^10.0.0
  get_it: ^9.2.1
  go_router: ^17.2.0
  injectable: ^2.7.1+4
  livekit_client: ^2.6.4
  shared_preferences: ^2.5.5
  socket_io_client: ^3.1.4
  web_socket_channel: ^3.0.3
  pay: ^2.0.0
  flutter_credit_card: ^4.0.1
  audioplayers: ^6.1.0
  google_fonts: ^8.0.2
  flutter_svg: ^2.2.4
  intl_phone_field: ^3.2.0
  country_picker: ^2.0.26
  pinput: ^6.0.2
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  badges: ^3.2.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_contacts: ^2.0.2
  uuid: ^4.5.3
  permission_handler: ^12.0.1
  flutter_ringtone_player: ^4.0.0+4
  flutter_native_splash: ^2.4.7
  intl: ^0.20.2
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  just_audio: ^0.10.5
  record: ^6.2.0
  path_provider: ^2.1.5
  audio_waveforms: ^2.0.2
  fpdart: ^1.1.0
  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  flutter_dotenv: ^6.0.1
  just_audio_background: ^0.0.1-beta.17
  flutter_sound: ^9.30.0
  audio_session: ^0.2.3
  video_player: ^2.11.1
  video_thumbnail: ^0.5.6
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.1
  gal: ^2.3.0
  flutter_screen_recording: ^2.0.0
  easy_localization: ^3.0.8
  latlong2: ^0.9.1
  widget_to_marker: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  injectable_generator: ^2.12.1
  build_runner: ^2.13.1
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logo.png
    - assets/translations/
    - .env

dependency_overrides:
  connectivity_plus: ^6.1.1
  device_info_plus: '10.1.2'
  flutter_screen_recording:
    path: packages/flutter_screen_recording
  # Vendored fork of flutter_webrtc 1.4.1 patched to start a ScreenCaptureService
  # (FGS, type=mediaProjection) before calling MediaProjectionManager.getMediaProjection().
  # Without this, screen sharing crashes on Android 14 (API 34) with
  # SecurityException "Media projections require a foreground service of type
  # FOREGROUND_SERVICE_TYPE_MEDIA_PROJECTION". The upstream plugin has not
  # shipped a fix as of 1.4.1.
  flutter_webrtc:
    path: packages/flutter_webrtc